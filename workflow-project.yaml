project:
  name: dev-workflow-skills
  default_language: zh-CN

paths:
  # Only progress paths are bound. paths.requirements / paths.acceptance /
  # paths.architecture are intentionally NOT bound — see
  # docs/variant-c-skill-acceptance/decisions.md D-003 + D-006.
  # (Recursive paradox: this repo IS the source of acceptance-designer;
  # binding paths.acceptance creates new/old semantic conflicts.)
  progress: docs/workflow/progress.md
  progress_history: docs/workflow/progress-history.md

workflow:
  use_progress_tracking: true
  default_doc_language: zh-CN
